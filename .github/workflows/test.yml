name: test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  # Detect the modules affected by this change (see the changed-modules action).
  changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - id: detect
        uses: ./.github/actions/changed-modules

  testing:
    needs: changes
    if: needs.changes.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.changes.outputs.modules) }}
    # Test each module through its own go.mod (and replace), like a consumer.
    env:
      GOWORK: off
    steps:
      - name: cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@6ee257338e68af2b279b321b3346fe5f385aa498 # v0.0.29
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "${{ matrix.module }}/go.mod"
          cache-dependency-path: "${{ matrix.module }}/go.sum"
      - name: go test
        working-directory: ${{ matrix.module }}
        run: go test -race ./...
